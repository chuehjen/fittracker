<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>FitTracker Pro - 赛博版</title>
<meta name="description" content="赛博朋克风格健身追踪应用">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js" onerror="window._chartLoadFailed=true"></script>
<style>
:root{
  --bg:#030308;--bg2:#0a0a16;--card:#111122;--card-h:#1a1a2e;--input:#0d0d1a;
  --acc:#00f3ff;--acc-d:#00c4d4;--acc-g:rgba(0,243,255,.1);--acc-gs:rgba(0,243,255,.4);
  --ok:#00ff88;--ok-g:rgba(0,255,136,.1);--warn:#ffcc00;--warn-g:rgba(255,204,0,.1);
  --err:#ff3366;--t1:#ffffff;--t2:#8899aa;--t3:#556677;
  --bd:#223344;--bd2:#334455;
  --tab-h:64px;--sab:env(safe-area-inset-bottom,0px);
  --r-s:6px;--r-m:10px;--r-l:14px;--r-xl:18px;--r-f:9999px;
  --sh:0 0 30px rgba(0,243,255,.1);--sh-g:0 0 25px var(--acc-g);
  --tr:all .3s cubic-bezier(.4,0,.2,1);
  --accent:#00f3ff;
  --neon-glow:0 0 5px var(--acc),0 0 10px var(--acc),0 0 20px var(--acc-g);
  --cyber-font:'Courier New',monospace;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{font-family:system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--t1);font-size:15px;line-height:1.5}
input,textarea,select,button{font:inherit;color:inherit;border:none;outline:none;background:none}
button{cursor:pointer}
::-webkit-scrollbar{width:0;height:0}
#app{height:100%;display:flex;flex-direction:column;max-width:430px;margin:0 auto;position:relative}
.views{flex:1;overflow:hidden;position:relative}
.view{position:absolute;inset:0;overflow-y:auto;padding:16px 16px calc(var(--tab-h) + var(--sab) + 16px);display:none;-webkit-overflow-scrolling:touch}
.view.active{display:block;animation:fadeIn .25s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.tab-bar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;height:calc(var(--tab-h) + var(--sab));padding-bottom:var(--sab);background:linear-gradient(180deg,rgba(10,10,22,.95),rgba(3,3,8,.98));backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:1px solid var(--bd);display:flex;z-index:100}
.tab-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;color:var(--t3);transition:var(--tr);padding:8px 0;position:relative}
.tab-item.active{color:var(--acc)}
.tab-item.active::before{content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);width:20px;height:2px;background:var(--acc);box-shadow:var(--neon-glow)}
.tab-item svg{width:24px;height:24px;transition:var(--tr);filter:drop-shadow(0 0 2px var(--acc-g))}
.tab-item span{font-size:11px;font-weight:500;letter-spacing:.5px}
.card{background:linear-gradient(135deg,rgba(17,17,34,.9),rgba(26,26,46,.9));border-radius:var(--r-l);padding:16px;margin-bottom:12px;border:1px solid var(--bd);transition:var(--tr);position:relative;overflow:hidden}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--acc-g),transparent)}
.card:hover{border-color:var(--bd2);box-shadow:var(--sh)}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:12px 24px;border-radius:var(--r-m);font-weight:600;font-size:15px;transition:var(--tr);white-space:nowrap;letter-spacing:.5px}
.btn-primary{background:linear-gradient(135deg,var(--acc),var(--acc-d));color:#000;box-shadow:0 0 20px rgba(0,243,255,.3)}
.btn-primary:active{transform:scale(.97);box-shadow:0 0 30px rgba(0,243,255,.5)}
.btn-outline{border:1.5px solid var(--acc);color:var(--acc);background:var(--acc-g)}
.btn-outline:active{background:var(--acc-gs)}
.btn-ghost{color:var(--t2);padding:8px 16px}
.btn-ghost:active{color:var(--t1);background:rgba(255,255,255,.05)}
.btn-danger{background:rgba(255,51,102,.15);color:var(--err);border:1px solid var(--err)}
.btn-danger:active{background:rgba(255,51,102,.25)}
.btn-sm{padding:8px 16px;font-size:13px;border-radius:var(--r-s)}
.btn-block{width:100%;display:flex}
.btn-icon{width:40px;height:40px;padding:0;border-radius:var(--r-m);display:flex;align-items:center;justify-content:center}
.input-group{margin-bottom:16px}
.input-group label{display:block;font-size:13px;color:var(--t2);margin-bottom:6px;font-weight:500;letter-spacing:.5px}
.input-field{width:100%;padding:12px 16px;background:var(--input);border:1.5px solid var(--bd);border-radius:var(--r-m);color:var(--t1);font-size:15px;transition:var(--tr);font-family:var(--cyber-font)}
.input-field:focus{border-color:var(--acc);box-shadow:0 0 0 3px var(--acc-g)}
.input-field::placeholder{color:var(--t3)}
textarea.input-field{min-height:80px;resize:vertical}
.badge{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:var(--r-f);font-size:12px;font-weight:600}
.badge-accent{background:var(--acc-g);color:var(--acc);border:1px solid var(--acc)}
.badge-success{background:var(--ok-g);color:var(--ok);border:1px solid var(--ok)}
.badge-warn{background:var(--warn-g);color:var(--warn);border:1px solid var(--warn)}
.badge-machine{background:rgba(168,85,247,.15);color:#c084fc;border:1px solid rgba(168,85,247,.3)}
.badge-free{background:rgba(251,146,60,.15);color:#fbbf24;border:1px solid rgba(251,146,60,.3)}
.section-title{font-size:18px;font-weight:700;margin-bottom:12px;text-transform:uppercase;letter-spacing:1px}
.section-sub{font-size:13px;color:var(--t2);margin-bottom:16px}
.divider{height:1px;background:linear-gradient(90deg,transparent,var(--bd),transparent);margin:16px 0}
.avatar{width:64px;height:64px;border-radius:var(--r-f);background:var(--card);border:2px solid var(--bd);overflow:hidden;display:flex;align-items:center;justify-content:center;color:var(--t3);font-size:24px;cursor:pointer;flex-shrink:0;box-shadow:var(--sh)}
.avatar img{width:100%;height:100%;object-fit:cover}
.bp-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:16px}
.bp-card{background:linear-gradient(135deg,var(--card),var(--card-h));border:1.5px solid var(--bd);border-radius:var(--r-l);padding:16px 8px;text-align:center;cursor:pointer;transition:var(--tr);position:relative;overflow:hidden}
.bp-card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--acc-g),transparent)}
.bp-card:active{transform:scale(.96)}
.bp-card.selected{border-color:var(--acc);background:var(--acc-g);box-shadow:var(--sh-g)}
.bp-card svg{width:48px;height:48px;margin:0 auto 8px;display:block;filter:drop-shadow(0 0 4px var(--acc-g));color:#00f3ff;min-width:48px;min-height:48px}
.bp-card .bp-name{font-size:14px;font-weight:600;letter-spacing:.5px}
.ex-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.ex-card{background:linear-gradient(135deg,var(--card),var(--card-h));border:1px solid var(--bd);border-radius:var(--r-m);padding:12px 8px 10px;text-align:center;cursor:pointer;transition:var(--tr);position:relative}
.ex-card:active{background:var(--card-h);transform:scale(.97)}
.ex-card .ex-icon{width:72px;height:72px;margin:0 auto 8px;border-radius:12px;background:var(--acc-g);display:flex;align-items:center;justify-content:center;padding:6px;filter:drop-shadow(0 0 8px var(--acc-g));color:#00f3ff;min-width:72px;min-height:72px}
.ex-card .ex-icon svg{width:100%;height:100%;display:block;min-width:40px;min-height:40px}
.ex-card .ex-name{font-size:13px;font-weight:600;line-height:1.3;color:var(--t1)}
.ex-card .ex-tip{font-size:11px;color:var(--t3);margin-top:3px;line-height:1.3;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ex-card .ex-badge{position:absolute;top:6px;right:6px}
.ex-card .ex-add{position:absolute;top:6px;left:6px;width:22px;height:22px;border-radius:50%;background:var(--acc);color:#000;display:flex;align-items:center;justify-content:center;box-shadow:0 0 10px var(--acc-g)}
.ex-card .ex-add svg{width:14px;height:14px}
.training-header{display:flex;align-items:center;justify-content:space-between;padding:12px 0;margin-bottom:12px}
.training-timer{font-size:28px;font-weight:700;font-variant-numeric:tabular-nums;color:var(--acc);text-shadow:0 0 10px var(--acc-g);font-family:var(--cyber-font)}
.set-row{display:flex;align-items:center;gap:8px;padding:10px 0;border-bottom:1px solid rgba(34,51,68,.5)}
.set-row .set-num{width:28px;height:28px;border-radius:var(--r-f);background:var(--acc-g);color:var(--acc);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0}
.set-row .set-info{flex:1;font-size:14px}
.set-row .set-info strong{color:var(--t1)}
.set-row .set-info span{color:var(--t2)}
.set-row .pr-badge{color:var(--ok);font-size:12px;font-weight:700}
.set-input-row{display:flex;gap:8px;align-items:center;margin-top:8px}
.set-input-row input{flex:1;padding:10px;background:var(--input);border:1.5px solid var(--bd);border-radius:var(--r-s);text-align:center;font-size:16px;font-weight:600;color:var(--t1);font-family:var(--cyber-font)}
.set-input-row input:focus{border-color:var(--acc)}
.set-input-row input::placeholder{color:var(--t3);font-weight:400;font-size:13px}
.set-tbl-hd{display:grid;grid-template-columns:36px 1fr 1fr 44px;gap:6px;padding:8px 0;border-bottom:1px solid var(--bd)}
.set-tbl-hd span{font-size:11px;color:var(--t3);text-align:center;font-weight:600;letter-spacing:.5px}
.set-tbl-row{display:grid;grid-template-columns:36px 1fr 1fr 44px;gap:6px;align-items:center;padding:8px 0;border-bottom:1px solid rgba(34,51,68,.3)}
.s-num{width:28px;height:28px;border-radius:50%;background:var(--acc-g);color:var(--acc);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;margin:0 auto}
.s-val{text-align:center;font-size:14px;font-weight:600;color:var(--t1)}
.set-tbl-row input{width:100%;padding:8px 4px;background:var(--input);border:1.5px solid var(--bd);border-radius:var(--r-s);text-align:center;font-size:14px;font-weight:600;color:var(--t1);font-family:var(--cyber-font)}
.set-tbl-row input:focus{border-color:var(--acc)}
.set-tbl-row input::placeholder{color:var(--t3);font-weight:400;font-size:12px}
.s-check-btn{width:36px;height:36px;border-radius:50%;background:var(--acc);color:#000;display:flex;align-items:center;justify-content:center;cursor:pointer;border:none;margin:0 auto;transition:var(--tr);box-shadow:0 0 10px var(--acc-g)}
.s-check-btn:active{transform:scale(.9);background:var(--acc-d)}
.s-check-btn svg{width:18px;height:18px;stroke-width:3}
.swipe-wrap{position:relative;overflow:hidden;border-bottom:1px solid rgba(34,51,68,.3)}
.swipe-wrap .set-tbl-row{border-bottom:none;transition:transform .2s ease;touch-action:pan-y}
.swipe-del{position:absolute;right:0;top:0;bottom:0;width:72px;background:var(--err);display:flex;align-items:center;justify-content:center;color:#fff;font-size:12px;font-weight:600}
.rest-bar{display:flex;align-items:center;gap:8px;margin-top:8px;flex-wrap:wrap}
.rest-pick{padding:4px 10px;border-radius:var(--r-f);font-size:12px;font-weight:600;background:var(--card);border:1px solid var(--bd);color:var(--t2);cursor:pointer;transition:var(--tr);font-family:var(--cyber-font)}
.rest-pick.active{background:var(--acc-g);border-color:var(--acc);color:var(--acc)}
.rest-start-btn{padding:4px 12px;border-radius:var(--r-f);font-size:12px;font-weight:600;background:var(--acc);color:#000;border:none;cursor:pointer;display:flex;align-items:center;gap:4px;transition:var(--tr);box-shadow:0 0 10px var(--acc-g)}
.rest-start-btn:active{transform:scale(.95);background:var(--acc-d)}
.rest-start-btn svg{width:14px;height:14px}
.timer-overlay{position:fixed;inset:0;z-index:200;background:rgba(3,3,8,.98);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;animation:fadeIn .2s}
.timer-circle{position:relative;width:200px;height:200px}
.timer-circle svg{width:100%;height:100%;transform:rotate(-90deg)}
.timer-circle .track{fill:none;stroke:var(--bd);stroke-width:10}
.timer-circle .progress{fill:none;stroke:var(--err);stroke-width:10;stroke-linecap:round;transition:stroke-dashoffset .3s linear;filter:drop-shadow(0 0 10px var(--err))}
.timer-text{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px}
.timer-label{font-size:14px;color:var(--t2);letter-spacing:2px;font-weight:600;font-family:var(--cyber-font)}
.filter-bar{display:flex;gap:8px;overflow-x:auto;padding-bottom:12px;margin-bottom:12px}
.filter-chip{padding:8px 16px;border-radius:var(--r-f);font-size:13px;font-weight:500;background:var(--card);border:1px solid var(--bd);color:var(--t2);white-space:nowrap;cursor:pointer;transition:var(--tr)}
.filter-chip.active{background:var(--acc-g);border-color:var(--acc);color:var(--acc)}
.history-card{background:var(--card);border:1px solid var(--bd);border-radius:var(--r-l);margin-bottom:10px;overflow:hidden;transition:var(--tr)}
.history-card-header{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;cursor:pointer}
.history-card-header:active{background:var(--card-h)}
.hc-left{display:flex;flex-direction:column;gap:2px}
.hc-left .hc-date{font-size:13px;color:var(--t2);font-family:var(--cyber-font)}
.hc-left .hc-title{font-size:15px;font-weight:600}
.hc-right{display:flex;align-items:center;gap:8px}
.hc-right .hc-vol{font-size:13px;color:var(--t2)}
.hc-detail{padding:0 16px 14px;display:none}
.history-card.expanded .hc-detail{display:block}
.history-card.expanded{border-color:var(--bd2)}
.hc-photo{width:100%;border-radius:var(--r-m);margin-top:10px;max-height:200px;object-fit:cover}
.hc-notes{font-size:13px;color:var(--t2);margin-top:8px;padding:10px;background:var(--input);border-radius:var(--r-s);font-family:var(--cyber-font)}
.sub-tabs{display:flex;gap:0;margin-bottom:16px;background:var(--card);border-radius:var(--r-m);overflow:hidden;border:1px solid var(--bd)}
.sub-tab{flex:1;padding:10px;text-align:center;font-size:14px;font-weight:500;color:var(--t2);cursor:pointer;transition:var(--tr);letter-spacing:.5px}
.sub-tab.active{background:var(--acc-g);color:var(--acc)}
.profile-header{display:flex;align-items:center;gap:16px;margin-bottom:24px}
.profile-info{flex:1}
.profile-info h2{font-size:20px;font-weight:700}
.profile-info p{font-size:13px;color:var(--t2)}
.stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:24px}
.stat-card{background:linear-gradient(135deg,var(--card),var(--card-h));border:1px solid var(--bd);border-radius:var(--r-m);padding:14px;text-align:center}
.stat-card .stat-val{font-size:24px;font-weight:700;color:var(--acc);text-shadow:0 0 10px var(--acc-g)}
.stat-card .stat-label{font-size:12px;color:var(--t2);margin-top:2px}
.chart-container{background:var(--card);border:1px solid var(--bd);border-radius:var(--r-l);padding:16px;margin-bottom:16px}
.chart-container h3{font-size:15px;font-weight:600;margin-bottom:12px}
.chart-wrap{position:relative;height:200px}
.ai-card{background:linear-gradient(135deg,rgba(0,243,255,.08),rgba(168,85,247,.08));border:1px solid rgba(0,243,255,.3);border-radius:var(--r-l);padding:16px;margin-bottom:16px;position:relative;overflow:hidden}
.ai-card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--acc),transparent)}
.ai-card .ai-header{display:flex;align-items:center;gap:8px;margin-bottom:10px;font-size:14px;font-weight:600;color:var(--acc);letter-spacing:.5px}
.ai-card .ai-body{font-size:14px;line-height:1.7;color:var(--t2)}
.ai-card .ai-body strong{color:var(--t1)}
.modal-overlay{position:fixed;inset:0;z-index:300;background:rgba(3,3,8,.9);display:flex;align-items:flex-end;justify-content:center;animation:fadeIn .15s}
.modal{background:var(--bg2);border-radius:var(--r-xl) var(--r-xl) 0 0;width:100%;max-width:430px;max-height:80vh;overflow-y:auto;padding:20px 16px calc(16px + var(--sab));animation:slideUp .25s ease;border:1px solid var(--bd)}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:none}}
.modal-handle{width:40px;height:4px;background:var(--bd2);border-radius:2px;margin:0 auto 16px}
.modal h3{font-size:17px;font-weight:700;margin-bottom:16px;letter-spacing:.5px}
.empty{text-align:center;padding:40px 20px;color:var(--t3)}
.empty svg{width:64px;height:64px;margin:0 auto 16px;opacity:.5}
.empty p{font-size:14px;margin-bottom:16px}
.view::-webkit-scrollbar{display:none}
.view{scrollbar-width:none}
.flex-between{display:flex;align-items:center;justify-content:space-between}
.gap-8{gap:8px}.mt-8{margin-top:8px}.mt-16{margin-top:16px}.mb-8{margin-bottom:8px}.mb-16{margin-bottom:16px}
.text-center{text-align:center}
.text-sm{font-size:13px}
.text-xs{font-size:12px}
.text-muted{color:var(--t2)}
.text-accent{color:var(--acc)}
.text-ok{color:var(--ok)}
.text-warn{color:var(--warn)}
.fw-700{font-weight:700}
.hidden{display:none!important}
.achievements-section{margin-top:16px}
.achievements-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:8px}
.achievement-badge{background:linear-gradient(135deg,var(--card),var(--card-h));border:1px solid var(--bd);border-radius:var(--r-m);padding:8px 4px;text-align:center;cursor:pointer;transition:var(--tr);position:relative;overflow:hidden}
.achievement-badge.locked{opacity:.4;filter:grayscale(1)}
.achievement-badge.unlocked{border-color:var(--acc);box-shadow:0 0 15px var(--acc-g)}
.achievement-badge.unlocked::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--acc),transparent)}
.achievement-badge .badge-icon{font-size:24px;margin-bottom:4px;display:block}
.achievement-badge .badge-name{font-size:10px;color:var(--t2);line-height:1.2}
.achievement-badge.unlocked .badge-name{color:var(--acc)}
.news-section{margin-top:16px}
.news-card{background:linear-gradient(135deg,rgba(0,243,255,.05),rgba(168,85,247,.05));border:1px solid rgba(0,243,255,.2);border-radius:var(--r-l);padding:14px;margin-bottom:10px;position:relative;overflow:hidden}
.news-card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--acc),transparent)}
.news-card .news-header{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.news-card .news-icon{width:20px;height:20px;color:var(--acc)}
.news-card .news-title{font-size:13px;font-weight:600;color:var(--t1);letter-spacing:.5px}
.news-card .news-tag{font-size:10px;padding:2px 6px;border-radius:var(--r-f);background:var(--acc-g);color:var(--acc);border:1px solid var(--acc)}
.news-card .news-content{font-size:13px;line-height:1.6;color:var(--t2)}
.news-card .news-content strong{color:var(--t1)}
.cyber-header{text-align:center;margin-bottom:20px}
.cyber-header .title{font-size:24px;font-weight:700;color:var(--t1);letter-spacing:2px;text-transform:uppercase;text-shadow:0 0 20px var(--acc-g)}
.cyber-header .subtitle{font-size:12px;color:var(--t2);margin-top:4px;letter-spacing:1px;font-family:var(--cyber-font)}
</style>
</head>
<body>
<div id="app">
  <div class="views" id="views"></div>
  <nav class="tab-bar" id="tabBar"></nav>
</div>
<script>

// ===== EXERCISE DATABASE =====
const BODY_PARTS=[
  {id:'chest',name:'胸',icon:'chest'},
  {id:'back',name:'背',icon:'back'},
  {id:'legs',name:'腿',icon:'legs'},
  {id:'shoulders',name:'肩',icon:'shoulders'},
  {id:'arms',name:'手臂',icon:'arms'},
  {id:'core',name:'核心',icon:'core'}

function checkConsecutiveDays(state,days){
  if(state.trainingRecords.length<days)return false;
  const dates=[...state.trainingRecords].map(r=>r.date).sort().reverse();
  let consecutive=1;
  for(let i=1;i<dates.length;i++){
    const prev=new Date(dates[i-1]),curr=new Date(dates[i]);
    const diff=(prev-curr)/(1000*60*60*24);
    if(diff===1)consecutive++;else if(diff>1)break;
  }
  return consecutive>=days;
}

function aiPreWorkout(){
  const recs=S.trainingRecords.slice(-14);
  if(recs.length===0)return{title:'开启你的赛博健身之旅',body:'还没有训练记录。选择一个部位开始吧！建议从大肌群（胸、背、腿）开始。'};
  const partCount={};const lastPart={};
  recs.forEach(r=>{partCount[r.bodyPart]=(partCount[r.bodyPart]||0)+1;if(!lastPart[r.bodyPart]||r.date>lastPart[r.bodyPart])lastPart[r.bodyPart]=r.date});
  const allParts=BODY_PARTS.map(b=>b.id);
  const neglected=allParts.filter(p=>!partCount[p]);
  if(neglected.length>0){const bp=neglected[0];return{title:'系统建议',body:`你最近没有训练过<strong>${getBodyPartName(bp)}</strong>，今天练一下吧！`}}
  const sorted=allParts.sort((a,b)=>(lastPart[a]||'')>(lastPart[b]||'')?1:-1);
  const suggest=sorted[0];
  const lastDate=lastPart[suggest];
  const days=lastDate?Math.floor((new Date()-new Date(lastDate))/(86400000)):999;
  return{title:'今日推荐',body:`距离上次练<strong>${getBodyPartName(suggest)}</strong>已经${days}天了，建议今天安排${getBodyPartName(suggest)}训练。`};
}
function aiPostWorkout(record){
  const vol=calcVolume(record.exercises);
  const prevSame=S.trainingRecords.filter(r=>r.bodyPart===record.bodyPart&&r.id!==record.id).sort((a,b)=>b.date.localeCompare(a.date));
  let comp='';
  if(prevSame.length>0){
    const prevVol=calcVolume(prevSame[0].exercises);
    const diff=vol-prevVol;const pct=prevVol>0?Math.round(diff/prevVol*100):0;
    if(diff>0)comp=`训练量比上次提升了<strong>${pct}%</strong>`;else if(diff<0)comp=`训练量比上次减少了<strong>${Math.abs(pct)}%</strong>`;else comp='训练量与上次持平';
  }
  let prList=[];
  record.exercises.forEach(ex=>{const maxW=Math.max(...ex.sets.map(s=>s.weight));const prevMax=getPRBefore(ex.name,record.id);if(maxW>prevMax&&prevMax>0)prList.push(ex.name)});
  let prText=prList.length>0?`恭喜突破 PR！<strong>${prList.join('、')}</strong>`:'';
  const msgs=['每一次训练都在让你变得更强。','坚持就是胜利，你做到了！','汗水不会辜负你的努力。'];
  return{vol,comp,prText,motto:msgs[Math.floor(Math.random()*msgs.length)],duration:record.duration};
}
function getPRBefore(name,excludeId){let max=0;S.trainingRecords.forEach(r=>{if(r.id!==excludeId)r.exercises.forEach(ex=>{if(ex.name===name)ex.sets.forEach(s=>{if(s.weight>max)max=s.weight})})});return max}
function aiDietFeedback(bodyRec){
  const diet=(bodyRec.diet||'').toLowerCase();
  const todayTraining=S.trainingRecords.filter(r=>r.date===bodyRec.date);
  if(!diet)return null;
  let tips=[];
  const hasProtein=/(蛋白 | 鸡胸 | 牛肉 | 鱼 | 虾|蛋 | 奶)/.test(diet);
  const hasCarb=/(碳水 | 米饭 | 面 | 香蕉 | 红薯 | 燕麦)/.test(diet);
  if(todayTraining.length>0){
    if(!hasProtein)tips.push('今天有训练但蛋白质摄入不足，建议补充。');
    if(!hasCarb)tips.push('训练后适当补充碳水化合物。');
  }else{tips.push('休息日可以适当控制碳水摄入量。');}
  return tips.join(' ');
}
function aiWeeklyReport(){
  const now=new Date();const weekAgo=new Date(now-7*86400000);
  const weekStr=weekAgo.toISOString().slice(0,10);
  const weekRecs=S.trainingRecords.filter(r=>r.date>=weekStr);
  if(weekRecs.length===0)return{title:'本周 AI 周报',body:'本周还没有训练记录，开始行动吧！'};
  let report=[];
  report.push(`本周训练了<strong>${weekRecs.length}次</strong>。`);
  const partCounts={};weekRecs.forEach(r=>{partCounts[r.bodyPart]=(partCounts[r.bodyPart]||0)+1});
  const untrained=BODY_PARTS.filter(b=>!partCounts[b.id]).map(b=>b.name);
  if(untrained.length>0)report.push(`未训练部位：<strong>${untrained.join('、')}</strong>`);
  return{title:'本周 AI 周报',body:report.join('<br>')};
}

function renderActiveTraining(){
  if(!S.currentTraining){S.trainingScreen='home';renderTraining();return;}

        </div>
      </div>
      <div class="training-timer" id="trainingTime" style="font-size:32px;margin-top:2px">${fmtTime(elapsed)}</div>

        <div style="display:flex;gap:4px" id="restPicker">
          ${[30,60,90,120,180].map(s=>`<button class="rest-pick${S.restSeconds===s?' active':''}" data-sec="${s}">${s>=60&&s%60===0?s/60+'min':s+'s'}</button>`).join('')}
        </div>

      </div>
    </div>
    ${ct.exercises.map((ex,ei)=>{
      const pr=getPR(ex.name);
      const currentMax=ex.sets.length>0?Math.max(...ex.sets.map(s=>s.weight)):0;
      const isPR=currentMax>0&&currentMax>getPRBefore(ex.name,ct.id)&&getPRBefore(ex.name,ct.id)>0;
      const nextNum=ex.sets.length+1;
      const lastW=ex.sets.length>0?ex.sets[ex.sets.length-1].weight:'';
      const lastR=ex.sets.length>0?ex.sets[ex.sets.length-1].reps:'';
      return`<div class="card" style="padding:12px">
        <div class="flex-between mb-8">
          <div>
            <span class="fw-700">${ex.name}</span>
            <span class="badge ${ex.type==='machine'?'badge-machine':'badge-free'} text-xs" style="margin-left:6px">${ex.type==='machine'?'器械':'自由'}</span>
            ${isPR?'<span class="badge badge-success text-xs" style="margin-left:4px">PR!</span>':''}
          </div>
          ${pr>0?`<span class="text-xs text-muted">PR: ${pr}kg</span>`:''}
        </div>
        <div class="set-tbl">
          <div class="set-tbl-hd"><span>组别</span><span>KG</span><span>次数</span><span></span></div>
          ${ex.sets.map((s,si)=>`<div class="swipe-wrap" data-ei="${ei}" data-si="${si}">
            <div class="swipe-del">删除</div>
            <div class="set-tbl-row swipe-content">
              <div class="s-num">${si+1}</div>
              <div class="s-val">${s.weight}</div>
              <div class="s-val">${s.reps}</div>
              <div style="text-align:center"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#00ff88" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg></div>
            </div>
          </div>`).join('')}
          <div class="set-tbl-row">
            <div class="s-num">${nextNum}</div>
            <input type="number" placeholder="kg" id="w-${ei}" inputmode="decimal" step="0.5" value="${lastW}">
            <input type="number" placeholder="次数" id="r-${ei}" inputmode="numeric" value="${lastR}">
            <button class="s-check-btn" onclick="addSet(${ei})"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg></button>
          </div>
        </div>
      </div>`;
    }).join('')}
  `);
  on('#btnAddMore','click',()=>{S.trainingScreen='selectExercise';renderTraining()});
  on('#btnFinish','click',finishTraining);
  $$('#restPicker .rest-pick').forEach(btn=>btn.addEventListener('click',()=>{
    S.restSeconds=parseInt(btn.dataset.sec);saveState();
    $$('#restPicker .rest-pick').forEach(b=>b.classList.toggle('active',b===btn));
  }));
  on('#btnRestTimer','click',()=>showTimer(S.restSeconds||90));
  ct.exercises.forEach((ex,ei)=>{
    const wI=$(`#w-${ei}`),rI=$(`#r-${ei}`);
    if(wI)wI.addEventListener('keydown',e=>{if(e.key==='Enter')addSet(ei)});
    if(rI)rI.addEventListener('keydown',e=>{if(e.key==='Enter')addSet(ei)});
  });
  $$('.swipe-wrap').forEach(wrap=>{
    const content=wrap.querySelector('.swipe-content');
    let startX=0,currentX=0,swiping=false;
    const ei=parseInt(wrap.dataset.ei),si=parseInt(wrap.dataset.si);
    content.addEventListener('touchstart',e=>{startX=e.touches[0].clientX;currentX=0;swiping=true},{passive:true});
    content.addEventListener('touchmove',e=>{
      if(!swiping)return;
      const dx=e.touches[0].clientX-startX;
      currentX=Math.min(0,Math.max(-80,dx));
      content.style.transform=`translateX(${currentX}px)`;
    },{passive:true});
    content.addEventListener('touchend',()=>{
      swiping=false;
      if(currentX<-40){content.style.transform='translateX(-72px)';wrap.querySelector('.swipe-del').onclick=()=>deleteSet(ei,si);}
      else{content.style.transform='translateX(0)';}
    });
  });
  if(S.trainingTimer.active&&!S.trainingTimer.interval){
    S.trainingTimer.interval=setInterval(()=>{
      const el=$('#trainingTime');
      if(el){const e=Math.floor((Date.now()-S.trainingTimer.startTime)/1000)+(S.trainingTimer.elapsed||0);el.textContent=fmtTime(e)}
    },1000);
  }
}
window.addSet=function(ei){
  const w=parseFloat($(`#w-${ei}`).value);
  const r=parseInt($(`#r-${ei}`).value);
  if(!w||!r||w<=0||r<=0)return;
  S.currentTraining.exercises[ei].sets.push({weight:w,reps:r});
  saveState();
  renderActiveTraining();
};
window.deleteSet=function(ei,si){
  S.currentTraining.exercises[ei].sets.splice(si,1);
  saveState();
  renderActiveTraining();
};
window.showTimer=function(seconds){
  S.timer={active:true,remaining:seconds,total:seconds,interval:null};
  renderTimer();
};
function renderTimer(){
  if(!S.timer.active)return;
  const existing=$('#timerOverlay');if(existing)existing.remove();
  let overlay=document.createElement('div');
  overlay.className='timer-overlay';
  overlay.id='timerOverlay';
  const circumference=2*Math.PI*90;
  const update=()=>{
    const pct=S.timer.remaining/S.timer.total;
    const offset=circumference*(1-pct);
    overlay.innerHTML=`
      <div class="timer-label">REST TIMER</div>
      <div class="timer-circle">
        <svg viewBox="0 0 200 200"><circle class="track" cx="100" cy="100" r="90"/><circle class="progress" cx="100" cy="100" r="90" stroke-dasharray="${circumference}" stroke-dashoffset="${offset}"/></svg>
        <div class="timer-text">
          <div style="font-size:14px;color:var(--t2);font-weight:500">准备</div>
          <div style="font-size:52px;font-weight:700;line-height:1;color:var(--t1);font-variant-numeric:tabular-nums">${S.timer.remaining}</div>
          <div style="font-size:12px;color:var(--t3);margin-top:4px">组间${S.timer.total}秒</div>
        </div>
      </div>
      <button class="btn btn-outline btn-block" id="timerSkip" style="max-width:200px;margin-top:8px">跳过</button>
    `;
  };
  update();
  document.body.appendChild(overlay);
  function tick(){
    S.timer.remaining--;
    if(S.timer.remaining<=0){
      clearInterval(S.timer.interval);S.timer.interval=null;S.timer.active=false;
      playBeep();
      setTimeout(()=>{const o=$('#timerOverlay');if(o)o.remove()},500);
      return;
    }
    update();bindTimerEvents();
  }
  function bindTimerEvents(){
    on('#timerSkip','click',()=>{
      clearInterval(S.timer.interval);S.timer.interval=null;S.timer.active=false;
      const o=$('#timerOverlay');if(o)o.remove();
    });
  }
  S.timer.interval=setInterval(tick,1000);
  bindTimerEvents();
}
function startTrainingTimer(){
  S.trainingTimer={active:true,startTime:Date.now(),elapsed:0,interval:null};
}
function stopTrainingTimer(){
  if(S.trainingTimer.active){
    S.trainingTimer.elapsed+=Math.floor((Date.now()-S.trainingTimer.startTime)/1000);
    S.trainingTimer.active=false;
    if(S.trainingTimer.interval){clearInterval(S.trainingTimer.interval);S.trainingTimer.interval=null}
  }
}
function finishTraining(){
  const ct=S.currentTraining;
  if(!ct)return;
  const totalSets=ct.exercises.reduce((t,ex)=>t+ex.sets.length,0);
  if(totalSets===0){
    if(!confirm('你还没有记录任何组数据，确定要完成训练吗？'))return;
  }
  stopTrainingTimer();
  ct.duration=S.trainingTimer.elapsed;
  ct.totalVolume=calcVolume(ct.exercises);
  S.trainingScreen='summary';
  renderTraining();
}

  html('#view-history',`
    <div class="section-title" style="font-size:22px;margin-bottom:4px">历史</div>
    <p class="text-muted mb-16">回顾你的健身旅程</p>
    <div class="sub-tabs">
      <div class="sub-tab${S.historySubTab==='training'?' active':''}" data-sub="training">训练历史</div>
      <div class="sub-tab${S.historySubTab==='body'?' active':''}" data-sub="body">体重/饮食</div>
    </div>
    <div id="historyContent"></div>
  `);
  $$('.sub-tab').forEach(el=>el.addEventListener('click',()=>{S.historySubTab=el.dataset.sub;renderHistory()}));
  if(S.historySubTab==='training')renderTrainingHistory();
  else renderBodyHistory();
}
function renderTrainingHistory(){
  const recs=[...S.trainingRecords].reverse();
  const filters=['all',...BODY_PARTS.map(b=>b.id)];
  const filtered=S.historyFilter==='all'?recs:recs.filter(r=>r.bodyPart===S.historyFilter);
  html('#historyContent',`
    <div class="filter-bar">
      ${filters.map(f=>`<div class="filter-chip${S.historyFilter===f?' active':''}" data-filter="${f}">${f==='all'?'全部':getBodyPartName(f)}</div>`).join('')}
    </div>
    ${filtered.length===0?`<div class="empty"><p>还没有训练记录</p></div>`:filtered.map(r=>{
      const vol=calcVolume(r.exercises);
      return`<div class="history-card" id="hc-${r.id}">
        <div class="history-card-header" onclick="toggleHistoryCard('${r.id}')">
          <div class="hc-left">
            <div class="hc-date">${fmtDateFull(r.date)}${r.duration?` · ${fmtDuration(r.duration)}`:''}</div>
            <div class="hc-title">${getBodyPartName(r.bodyPart)}训练</div>
          </div>
          <div class="hc-right">
            <div class="hc-vol">${fmtVol(vol)} kg</div>
            ${ICONS.chevDown}
          </div>
        </div>
        <div class="hc-detail">
          ${r.exercises.map(ex=>`<div style="margin-bottom:10px">
            <div class="flex-between"><span class="text-sm fw-700">${ex.name}</span><span class="badge ${ex.type==='machine'?'badge-machine':'badge-free'} text-xs">${ex.type==='machine'?'器械':'自由'}</span></div>
            ${ex.sets.map((s,i)=>`<div class="set-row"><div class="set-num">${i+1}</div><div class="set-info"><strong>${s.weight}kg</strong> <span>× ${s.reps}次</span></div></div>`).join('')}
          </div>`).join('')}
          ${r.photo?`<img class="hc-photo" src="${r.photo}" onclick="viewPhoto('${r.id}')">`:''}
          ${r.notes?`<div class="hc-notes">${r.notes}</div>`:''}
          <button class="btn btn-danger btn-sm mt-8" onclick="deleteTrainingRecord('${r.id}')">${ICONS.trash} 删除记录</button>
        </div>
      </div>`;
    }).join('')}
  `);
  $$('.filter-chip').forEach(el=>el.addEventListener('click',()=>{S.historyFilter=el.dataset.filter;renderTrainingHistory()}));
}
window.toggleHistoryCard=function(id){
  const card=$(`#hc-${id}`);if(card)card.classList.toggle('expanded');
};
window.viewPhoto=function(id){
  const rec=S.trainingRecords.find(r=>r.id===id);
  if(!rec||!rec.photo)return;
  const overlay=document.createElement('div');
  overlay.className='modal-overlay';
  overlay.style.alignItems='center';
  overlay.innerHTML=`<img src="${rec.photo}" style="max-width:90%;max-height:80vh;border-radius:var(--r-l);object-fit:contain">`;
  overlay.addEventListener('click',()=>overlay.remove());
  document.body.appendChild(overlay);
};
window.deleteTrainingRecord=function(id){
  if(!confirm('确定删除这条训练记录？'))return;
  S.trainingRecords=S.trainingRecords.filter(r=>r.id!==id);
  saveState();renderTrainingHistory();
};
function renderBodyHistory(){
  const recs=[...S.bodyRecords].reverse();
  html('#historyContent',`
    ${recs.length===0?'<div class="empty"><p>还没有体重/饮食记录</p></div>':recs.map(r=>`
      <div class="card" style="padding:12px 14px">
        <div class="flex-between">
          <span class="text-sm fw-700">${fmtDateFull(r.date)}</span>
          <div style="display:flex;gap:6px">
            ${r.weight?`<span class="badge badge-accent">${r.weight}kg</span>`:''}
            ${r.bodyFat?`<span class="badge badge-warn">${r.bodyFat}%</span>`:''}
            <button class="btn-icon btn-ghost" style="width:28px;height:28px" onclick="deleteBodyRecord('${r.id}')">${ICONS.trash}</button>
          </div>
        </div>
        ${r.diet?`<div class="text-xs text-muted mt-8">${r.diet}</div>`:''}
      </div>
    `).join('')}
  `);
}
window.deleteBodyRecord=function(id){
  if(!confirm('确定删除？'))return;
  S.bodyRecords=S.bodyRecords.filter(r=>r.id!==id);
  saveState();renderBodyHistory();
};

// ===== PROFILE VIEW =====
function renderProfile(){
  const totalTrainings=S.trainingRecords.length;
  const totalVolume=S.trainingRecords.reduce((t,r)=>t+calcVolume(r.exercises),0);
  const totalDuration=S.trainingRecords.reduce((t,r)=>t+(r.duration||0),0);
  const report=aiWeeklyReport();
  html('#view-profile',`
    <div class="profile-header">
      <div class="avatar" id="avatarBtn">
        ${S.profile.avatar?`<img src="${S.profile.avatar}">`:'👤'}
        <input type="file" accept="image/*" id="avatarInput" style="display:none">
      </div>
      <div class="profile-info">
        <h2 id="profileNameDisplay">${S.profile.name||'点击设置昵称'}</h2>
        <p>坚持训练，超越自我</p>
      </div>
      <button class="btn btn-ghost btn-sm" id="editProfileBtn">编辑</button>
    </div>
    <div class="stat-grid">
      <div class="stat-card"><div class="stat-val">${totalTrainings}</div><div class="stat-label">总训练次数</div></div>
      <div class="stat-card"><div class="stat-val">${fmtVol(totalVolume)}</div><div class="stat-label">总训练量 (kg)</div></div>
      <div class="stat-card"><div class="stat-val">${Math.round(totalDuration/3600)}</div><div class="stat-label">总时长 (h)</div></div>
    </div>
    <div class="ai-card">
      <div class="ai-header">${ICONS.ai} ${report.title}</div>
      <div class="ai-body">${report.body}</div>
    </div>
    <div id="charts">
      <div class="chart-container"><h3>体重/体脂趋势</h3><div class="chart-wrap"><canvas id="weightChart"></canvas></div></div>
      <div class="chart-container"><h3>训练频次</h3><div class="chart-wrap"><canvas id="freqChart"></canvas></div></div>
      <div class="chart-container"><h3>部位训练分布</h3><div class="chart-wrap" style="height:240px"><canvas id="distChart"></canvas></div></div>
      <div class="chart-container">
        <div class="flex-between mb-8"><h3 style="margin:0">动作进步曲线</h3>
          <select class="input-field" id="progressSelect" style="width:auto;padding:6px 10px;font-size:13px">${getExerciseOptions()}</select>
        </div>
        <div class="chart-wrap"><canvas id="progressChart"></canvas></div>
      </div>
    </div>
    <div class="divider"></div>
    <div class="section-title" style="font-size:15px">数据管理</div>
    <div style="display:flex;gap:8px;margin-bottom:80px">
      <button class="btn btn-outline btn-sm" style="flex:1" id="btnExport">${ICONS.exportIcon} 导出数据</button>
      <label class="btn btn-outline btn-sm" style="flex:1;cursor:pointer">${ICONS.importIcon} 导入数据
        <input type="file" accept=".json" id="importFile" style="display:none">
      </label>
    </div>
  `);
  on('#avatarBtn','click',()=>$('#avatarInput').click());
  on('#avatarInput','change',e=>{
    const file=e.target.files[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=ev=>{S.profile.avatar=ev.target.result;saveState();renderProfile()};
    reader.readAsDataURL(file);
  });
  on('#editProfileBtn','click',()=>{
    const overlay=document.createElement('div');overlay.className='modal-overlay';overlay.id='profileModal';
    overlay.innerHTML=`<div class="modal"><div class="modal-handle"></div><h3>编辑个人信息</h3>
      <div class="input-group"><label>昵称</label><input class="input-field" id="editName" value="${S.profile.name||''}" placeholder="输入你的昵称"></div>
      <div style="display:flex;gap:8px"><button class="btn btn-ghost" style="flex:1" id="cancelEdit">取消</button><button class="btn btn-primary" style="flex:1" id="saveEdit">保存</button></div>
    </div>`;
    document.body.appendChild(overlay);
    overlay.addEventListener('click',e=>{if(e.target===overlay)overlay.remove()});
    on('#cancelEdit','click',()=>overlay.remove());
    on('#saveEdit','click',()=>{S.profile.name=$('#editName').value.trim();saveState();overlay.remove();renderProfile()});
  });

  // Charts
  setTimeout(renderCharts,100);
  
  on('#btnExport','click',exportData);
  on('#importFile','change',importData);
}

function getExerciseOptions(){
  const allEx=new Set();
  S.trainingRecords.forEach(r=>r.exercises.forEach(ex=>allEx.add(ex.name)));
  if(allEx.size===0)return'<option value="">无数据</option>';
  return[...allEx].map(e=>`<option value="${e}">${e}</option>`).join('');
}

function renderCharts(){
  if(window._chartLoadFailed)return;
  const weightCtx=$('#weightChart').getContext('2d');
  const freqCtx=$('#freqChart').getContext('2d');
  const distCtx=$('#distChart').getContext('2d');
  const progressCtx=$('#progressChart').getContext('2d');
  
  // Weight chart
  const weightData=S.bodyRecords.filter(r=>r.weight).sort((a,b)=>a.date.localeCompare(b.date));
  if(weightData.length>0){
    new Chart(weightCtx,{
      type:'line',
      data:{
        labels:weightData.map(d=>fmtDate(d.date)),
        datasets:[{
          label:'体重 (kg)',
          data:weightData.map(d=>d.weight),
          borderColor:'#00f3ff',
          backgroundColor:'rgba(0,243,255,.1)',
          tension:.4,
          fill:true
        }]
      },
      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{grid:{color:'rgba(34,51,68,.5)'},ticks:{color:'#8899aa'}},y:{grid:{color:'rgba(34,51,68,.5)'},ticks:{color:'#8899aa'}}}}
    });
  }
  
  // Frequency chart
  const last7Days=[...Array(7)].map((_,i)=>{
    const d=new Date();d.setDate(d.getDate()-i);return d.toISOString().slice(0,10);
  }).reverse();
  const freqData=last7Days.map(date=>S.trainingRecords.filter(r=>r.date===date).length);
  new Chart(freqCtx,{
    type:'bar',
    data:{
      labels:last7Days.map(d=>{const p=d.split('-');return`${p[1]}/${p[2]}`}),
      datasets:[{
        label:'训练次数',
        data:freqData,
        backgroundColor:'rgba(0,243,255,.5)',
        borderRadius:4
      }]
    },
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{grid:{display:false},ticks:{color:'#8899aa'}},y:{grid:{color:'rgba(34,51,68,.5)'},ticks:{color:'#8899aa'},beginAtZero:true}}}
  });
  
  // Distribution chart
  const partDist=BODY_PARTS.map(bp=>({name:bp.name,count:S.trainingRecords.filter(r=>r.bodyPart===bp.id).length}));
  new Chart(distCtx,{
    type:'doughnut',
    data:{
      labels:partDist.map(p=>p.name),
      datasets:[{
        data:partDist.map(p=>p.count),
        backgroundColor:['#00f3ff','#00ff88','#ffcc00','#ff3366','#a78bfa','#fb923c']
      }]
    },
    options:{responsive:true,maintainAspectRatio:false,cutout:'60%',plugins:{legend:{position:'right',labels:{color:'#8899aa'}}}}
  });
  
  // Progress chart
  const selectedEx=$('#progressSelect').value;
  if(selectedEx){
    const exRecords=S.trainingRecords.filter(r=>r.exercises.some(ex=>ex.name===selectedEx)).sort((a,b)=>a.date.localeCompare(b.date));
    const progressData=exRecords.map(r=>{
      const ex=r.exercises.find(e=>e.name===selectedEx);
      return ex?Math.max(...ex.sets.map(s=>s.weight)):0;
    });
    new Chart(progressCtx,{
      type:'line',
      data:{
        labels:exRecords.map(d=>fmtDate(d.date)),
        datasets:[{
          label:selectedEx+' PR',
          data:progressData,
          borderColor:'#00ff88',
          backgroundColor:'rgba(0,255,136,.1)',
          tension:.4,
          fill:true
        }]
      },
      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{grid:{color:'rgba(34,51,68,.5)'},ticks:{color:'#8899aa'}},y:{grid:{color:'rgba(34,51,68,.5)'},ticks:{color:'#8899aa'}}}}
    });
  }
  $('#progressSelect').addEventListener('change',()=>{setTimeout(renderCharts,50)});
}

function exportData(){
  const data={
    profile:S.profile,
    trainingRecords:S.trainingRecords,
    bodyRecords:S.bodyRecords,
    customExercises:S.customExercises,
    achievements:getUnlockedAchievements()
  };
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download=`fittracker_backup_${today()}.json`;
  a.click();
  URL.revokeObjectURL(url);
}

function importData(e){
  const file=e.target.files[0];
  if(!file)return;
  const reader=new FileReader();
  reader.onload=ev=>{
    try{
      const data=JSON.parse(ev.target.result);
      if(confirm('导入数据将覆盖当前所有记录，确定继续？')){
        S.profile=data.profile||DEFAULT_STATE.profile;
        S.trainingRecords=data.trainingRecords||[];
        S.bodyRecords=data.bodyRecords||[];
        S.customExercises=data.customExercises||[];
        if(data.achievements)localStorage.setItem('fittracker_achievements',JSON.stringify(data.achievements));
        saveState();
        alert('导入成功！');
        render();
      }
    }catch(err){alert('文件格式错误');}
  };
  reader.readAsText(file);
}

// ===== INIT =====
render();
</script>
</body>
</html>
