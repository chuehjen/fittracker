<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>FitTracker Pro - 健身轨迹</title>
<meta name="description" content="个人健身追踪应用，记录训练、体重、饮食">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js" onerror="window._chartLoadFailed=true"></script>
<style>
:root{
  --bg:#0B0B1A;--bg2:#141428;--card:#1C1C36;--card-h:#242448;--input:#12122A;
  --acc:#00E5FF;--acc-d:#00B8D4;--acc-g:rgba(0,229,255,.15);--acc-gs:rgba(0,229,255,.3);
  --ok:#00E676;--ok-g:rgba(0,230,118,.15);--warn:#FFB300;--warn-g:rgba(255,179,0,.15);
  --err:#FF5252;--t1:#E8E8FF;--t2:#8888AA;--t3:#555577;
  --bd:#2A2A4A;--bd2:#3A3A5A;
  --tab-h:64px;--sab:env(safe-area-inset-bottom,0px);
  --r-s:8px;--r-m:12px;--r-l:16px;--r-xl:20px;--r-f:9999px;
  --sh:0 4px 24px rgba(0,0,0,.3);--sh-g:0 0 20px var(--acc-g);
  --tr:all .3s cubic-bezier(.4,0,.2,1);
  --accent:#00E5FF;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{font-family:system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--t1);font-size:15px;line-height:1.5}
input,textarea,select,button{font:inherit;color:inherit;border:none;outline:none;background:none}
button{cursor:pointer}
::-webkit-scrollbar{width:0;height:0}
#app{height:100%;display:flex;flex-direction:column;max-width:430px;margin:0 auto;position:relative}
.views{flex:1;overflow:hidden;position:relative}
.view{position:absolute;inset:0;overflow-y:auto;padding:16px 16px calc(var(--tab-h) + var(--sab) + 16px);display:none;-webkit-overflow-scrolling:touch}
.view.active{display:block;animation:fadeIn .25s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
/* Tab Bar */
.tab-bar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;height:calc(var(--tab-h) + var(--sab));padding-bottom:var(--sab);background:rgba(20,20,40,.95);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:1px solid var(--bd);display:flex;z-index:100}
.tab-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;color:var(--t3);transition:var(--tr);padding:8px 0}
.tab-item.active{color:var(--acc)}
.tab-item svg{width:24px;height:24px;transition:var(--tr)}
.tab-item span{font-size:11px;font-weight:500}
/* Components */
.card{background:var(--card);border-radius:var(--r-l);padding:16px;margin-bottom:12px;border:1px solid var(--bd);transition:var(--tr)}
.card:hover{border-color:var(--bd2)}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:12px 24px;border-radius:var(--r-m);font-weight:600;font-size:15px;transition:var(--tr);white-space:nowrap}
.btn-primary{background:var(--acc);color:#0B0B1A}
.btn-primary:active{background:var(--acc-d);transform:scale(.97)}
.btn-outline{border:1.5px solid var(--acc);color:var(--acc)}
.btn-outline:active{background:var(--acc-g)}
.btn-ghost{color:var(--t2);padding:8px 16px}
.btn-ghost:active{color:var(--t1);background:rgba(255,255,255,.05)}
.btn-danger{background:rgba(255,82,82,.15);color:var(--err)}
.btn-danger:active{background:rgba(255,82,82,.25)}
.btn-sm{padding:8px 16px;font-size:13px;border-radius:var(--r-s)}
.btn-block{width:100%;display:flex}
.btn-icon{width:40px;height:40px;padding:0;border-radius:var(--r-m);display:flex;align-items:center;justify-content:center}
.input-group{margin-bottom:16px}
.input-group label{display:block;font-size:13px;color:var(--t2);margin-bottom:6px;font-weight:500}
.input-field{width:100%;padding:12px 16px;background:var(--input);border:1.5px solid var(--bd);border-radius:var(--r-m);color:var(--t1);font-size:15px;transition:var(--tr)}
.input-field:focus{border-color:var(--acc);box-shadow:0 0 0 3px var(--acc-g)}
.input-field::placeholder{color:var(--t3)}
textarea.input-field{min-height:80px;resize:vertical}
.badge{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:var(--r-f);font-size:12px;font-weight:600}
.badge-accent{background:var(--acc-g);color:var(--acc)}
.badge-success{background:var(--ok-g);color:var(--ok)}
.badge-warn{background:var(--warn-g);color:var(--warn)}
.badge-machine{background:rgba(124,58,237,.15);color:#A78BFA}
.badge-free{background:rgba(251,146,60,.15);color:#FB923C}
.section-title{font-size:18px;font-weight:700;margin-bottom:12px}
.section-sub{font-size:13px;color:var(--t2);margin-bottom:16px}
.divider{height:1px;background:var(--bd);margin:16px 0}
.avatar{width:64px;height:64px;border-radius:var(--r-f);background:var(--card);border:2px solid var(--bd);overflow:hidden;display:flex;align-items:center;justify-content:center;color:var(--t3);font-size:24px;cursor:pointer;flex-shrink:0}
.avatar img{width:100%;height:100%;object-fit:cover}
/* Body part grid */
.bp-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:16px}
.bp-card{background:var(--card);border:1.5px solid var(--bd);border-radius:var(--r-l);padding:16px 8px;text-align:center;cursor:pointer;transition:var(--tr)}
.bp-card:active{transform:scale(.96)}
.bp-card.selected{border-color:var(--acc);background:var(--acc-g);box-shadow:var(--sh-g)}
.bp-card svg{width:48px;height:48px;margin:0 auto 8px;display:block}
.bp-card .bp-name{font-size:14px;font-weight:600}
/* Exercise grid */
.ex-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.ex-card{background:var(--card);border:1px solid var(--bd);border-radius:var(--r-m);padding:12px 8px 10px;text-align:center;cursor:pointer;transition:var(--tr);position:relative}
.ex-card:active{background:var(--card-h);transform:scale(.97)}
.ex-card .ex-icon{width:72px;height:72px;margin:0 auto 8px;border-radius:12px;background:rgba(0,229,255,.06);display:flex;align-items:center;justify-content:center;padding:6px}
.ex-card .ex-icon svg{width:100%;height:100%;display:block}
.ex-card .ex-name{font-size:13px;font-weight:600;line-height:1.3;color:var(--t1)}
.ex-card .ex-tip{font-size:11px;color:var(--t3);margin-top:3px;line-height:1.3;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ex-card .ex-badge{position:absolute;top:6px;right:6px}
.ex-card .ex-add{position:absolute;top:6px;left:6px;width:22px;height:22px;border-radius:50%;background:var(--acc);color:#000;display:flex;align-items:center;justify-content:center}
.ex-card .ex-add svg{width:14px;height:14px}
/* Training active */
.training-header{display:flex;align-items:center;justify-content:space-between;padding:12px 0;margin-bottom:12px}
.training-timer{font-size:28px;font-weight:700;font-variant-numeric:tabular-nums;color:var(--acc)}
.set-row{display:flex;align-items:center;gap:8px;padding:10px 0;border-bottom:1px solid rgba(42,42,74,.5)}
.set-row .set-num{width:28px;height:28px;border-radius:var(--r-f);background:var(--acc-g);color:var(--acc);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0}
.set-row .set-info{flex:1;font-size:14px}
.set-row .set-info strong{color:var(--t1)}
.set-row .set-info span{color:var(--t2)}
.set-row .pr-badge{color:var(--ok);font-size:12px;font-weight:700}
.set-input-row{display:flex;gap:8px;align-items:center;margin-top:8px}
.set-input-row input{flex:1;padding:10px;background:var(--input);border:1.5px solid var(--bd);border-radius:var(--r-s);text-align:center;font-size:16px;font-weight:600;color:var(--t1)}
.set-input-row input:focus{border-color:var(--acc)}
.set-input-row input::placeholder{color:var(--t3);font-weight:400;font-size:13px}
/* Set table layout */
.set-tbl-hd{display:grid;grid-template-columns:36px 1fr 1fr 44px;gap:6px;padding:8px 0;border-bottom:1px solid var(--bd)}
.set-tbl-hd span{font-size:11px;color:var(--t3);text-align:center;font-weight:600}
.set-tbl-row{display:grid;grid-template-columns:36px 1fr 1fr 44px;gap:6px;align-items:center;padding:8px 0;border-bottom:1px solid rgba(42,42,74,.3)}
.s-num{width:28px;height:28px;border-radius:50%;background:var(--acc-g);color:var(--acc);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;margin:0 auto}
.s-val{text-align:center;font-size:14px;font-weight:600;color:var(--t1)}
.set-tbl-row input{width:100%;padding:8px 4px;background:var(--input);border:1.5px solid var(--bd);border-radius:var(--r-s);text-align:center;font-size:14px;font-weight:600;color:var(--t1)}
.set-tbl-row input:focus{border-color:var(--acc)}
.set-tbl-row input::placeholder{color:var(--t3);font-weight:400;font-size:12px}
.s-check-btn{width:36px;height:36px;border-radius:50%;background:var(--acc);color:#0B0B1A;display:flex;align-items:center;justify-content:center;cursor:pointer;border:none;margin:0 auto;transition:var(--tr)}
.s-check-btn:active{transform:scale(.9);background:var(--acc-d)}
.s-check-btn svg{width:18px;height:18px;stroke-width:3}
/* Swipe to delete */
.swipe-wrap{position:relative;overflow:hidden;border-bottom:1px solid rgba(42,42,74,.3)}
.swipe-wrap .set-tbl-row{border-bottom:none;transition:transform .2s ease;touch-action:pan-y}
.swipe-del{position:absolute;right:0;top:0;bottom:0;width:72px;background:var(--err);display:flex;align-items:center;justify-content:center;color:#fff;font-size:12px;font-weight:600}
/* Rest timer top bar */
.rest-bar{display:flex;align-items:center;gap:8px;margin-top:8px;flex-wrap:wrap}
.rest-pick{padding:4px 10px;border-radius:var(--r-f);font-size:12px;font-weight:600;background:var(--card);border:1px solid var(--bd);color:var(--t2);cursor:pointer;transition:var(--tr)}
.rest-pick.active{background:var(--acc-g);border-color:var(--acc);color:var(--acc)}
.rest-start-btn{padding:4px 12px;border-radius:var(--r-f);font-size:12px;font-weight:600;background:var(--acc);color:#0B0B1A;border:none;cursor:pointer;display:flex;align-items:center;gap:4px;transition:var(--tr)}
.rest-start-btn:active{transform:scale(.95);background:var(--acc-d)}
.rest-start-btn svg{width:14px;height:14px}
/* Timer overlay */
.timer-overlay{position:fixed;inset:0;z-index:200;background:rgba(11,11,26,.97);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;animation:fadeIn .2s}
.timer-circle{position:relative;width:200px;height:200px}
.timer-circle svg{width:100%;height:100%;transform:rotate(-90deg)}
.timer-circle .track{fill:none;stroke:var(--bd);stroke-width:10}
.timer-circle .progress{fill:none;stroke:#FF5252;stroke-width:10;stroke-linecap:round;transition:stroke-dashoffset .3s linear}
.timer-text{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px}
.timer-label{font-size:14px;color:var(--t2);letter-spacing:2px;font-weight:600}
.timer-btns{display:flex;gap:12px}
/* History */
.filter-bar{display:flex;gap:8px;overflow-x:auto;padding-bottom:12px;margin-bottom:12px}
.filter-chip{padding:8px 16px;border-radius:var(--r-f);font-size:13px;font-weight:500;background:var(--card);border:1px solid var(--bd);color:var(--t2);white-space:nowrap;cursor:pointer;transition:var(--tr)}
.filter-chip.active{background:var(--acc-g);border-color:var(--acc);color:var(--acc)}
.history-card{background:var(--card);border:1px solid var(--bd);border-radius:var(--r-l);margin-bottom:10px;overflow:hidden;transition:var(--tr)}
.history-card-header{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;cursor:pointer}
.history-card-header:active{background:var(--card-h)}
.hc-left{display:flex;flex-direction:column;gap:2px}
.hc-left .hc-date{font-size:13px;color:var(--t2)}
.hc-left .hc-title{font-size:15px;font-weight:600}
.hc-right{display:flex;align-items:center;gap:8px}
.hc-right .hc-vol{font-size:13px;color:var(--t2)}
.hc-detail{padding:0 16px 14px;display:none}
.history-card.expanded .hc-detail{display:block}
.history-card.expanded{border-color:var(--bd2)}
.hc-photo{width:100%;border-radius:var(--r-m);margin-top:10px;max-height:200px;object-fit:cover}
.hc-notes{font-size:13px;color:var(--t2);margin-top:8px;padding:10px;background:var(--input);border-radius:var(--r-s)}
/* Sub tabs */
.sub-tabs{display:flex;gap:0;margin-bottom:16px;background:var(--card);border-radius:var(--r-m);overflow:hidden;border:1px solid var(--bd)}
.sub-tab{flex:1;padding:10px;text-align:center;font-size:14px;font-weight:500;color:var(--t2);cursor:pointer;transition:var(--tr)}
.sub-tab.active{background:var(--acc-g);color:var(--acc)}
/* Profile */
.profile-header{display:flex;align-items:center;gap:16px;margin-bottom:24px}
.profile-info{flex:1}
.profile-info h2{font-size:20px;font-weight:700}
.profile-info p{font-size:13px;color:var(--t2)}
.stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:24px}
.stat-card{background:var(--card);border:1px solid var(--bd);border-radius:var(--r-m);padding:14px;text-align:center}
.stat-card .stat-val{font-size:24px;font-weight:700;color:var(--acc)}
.stat-card .stat-label{font-size:12px;color:var(--t2);margin-top:2px}
.chart-container{background:var(--card);border:1px solid var(--bd);border-radius:var(--r-l);padding:16px;margin-bottom:16px}
.chart-container h3{font-size:15px;font-weight:600;margin-bottom:12px}
.chart-wrap{position:relative;height:200px}
/* AI card */
.ai-card{background:linear-gradient(135deg,rgba(0,229,255,.08),rgba(124,58,237,.08));border:1px solid rgba(0,229,255,.2);border-radius:var(--r-l);padding:16px;margin-bottom:16px}
.ai-card .ai-header{display:flex;align-items:center;gap:8px;margin-bottom:10px;font-size:14px;font-weight:600;color:var(--acc)}
.ai-card .ai-body{font-size:14px;line-height:1.7;color:var(--t2)}
.ai-card .ai-body strong{color:var(--t1)}
/* Modal */
.modal-overlay{position:fixed;inset:0;z-index:300;background:rgba(11,11,26,.8);display:flex;align-items:flex-end;justify-content:center;animation:fadeIn .15s}
.modal{background:var(--bg2);border-radius:var(--r-xl) var(--r-xl) 0 0;width:100%;max-width:430px;max-height:80vh;overflow-y:auto;padding:20px 16px calc(16px + var(--sab));animation:slideUp .25s ease}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:none}}
.modal-handle{width:40px;height:4px;background:var(--bd2);border-radius:2px;margin:0 auto 16px}
.modal h3{font-size:17px;font-weight:700;margin-bottom:16px}
/* Empty state */
.empty{text-align:center;padding:40px 20px;color:var(--t3)}
.empty svg{width:64px;height:64px;margin:0 auto 16px;opacity:.5}
.empty p{font-size:14px;margin-bottom:16px}
/* Scrollbar fix for views */
.view::-webkit-scrollbar{display:none}
.view{scrollbar-width:none}
.flex-between{display:flex;align-items:center;justify-content:space-between}
.gap-8{gap:8px}
.mt-8{margin-top:8px}
.mt-16{margin-top:16px}
.mb-8{margin-bottom:8px}
.mb-16{margin-bottom:16px}
.text-center{text-align:center}
.text-sm{font-size:13px}
.text-xs{font-size:12px}
.text-muted{color:var(--t2)}
.text-accent{color:var(--acc)}
.text-ok{color:var(--ok)}
.text-warn{color:var(--warn)}
.fw-700{font-weight:700}
.hidden{display:none!important}
</style>
</head>
<body>
<div id="app">
  <div class="views" id="views"></div>
  <nav class="tab-bar" id="tabBar"></nav>
</div>
<script>
// ===== EXERCISE DATABASE =====
const BODY_PARTS=[
  {id:'chest',name:'胸',icon:'chest'},
  {id:'back',name:'背',icon:'back'},
  {id:'legs',name:'腿',icon:'legs'},
  {id:'shoulders',name:'肩',icon:'shoulders'},
  {id:'arms',name:'手臂',icon:'arms'},
  {id:'core',name:'核心',icon:'core'}
];
const EXERCISES={
  chest:{
    machine:['器械推胸','蝴蝶机夹胸','史密斯卧推','龙门架夹胸','器械下斜推胸'],
    free:['平板杠铃卧推','上斜哑铃卧推','平板哑铃飞鸟','双杠臂屈伸','俯卧撑']
  },

  },
  legs:{
    machine:['腿举机','腿屈伸','腿弯举','史密斯深蹲','小腿提踵机'],
    free:['杠铃深蹲','哑铃箭步蹲','罗马尼亚硬拉','保加利亚分腿蹲','壶铃摆壶']
  },
  shoulders:{
    machine:['器械肩推','器械侧平举','史密斯肩推','龙门架面拉','器械反向飞鸟'],
    free:['哑铃肩推','哑铃侧平举','哑铃前平举','杠铃提拉','阿诺德推举']
  },
  arms:{
    machine:['绳索弯举','绳索下压','牧师凳弯举机','器械臂屈伸','龙门架锤式弯举'],
    free:['杠铃弯举','哑铃锤式弯举','窄距卧推','颅骨粉碎者','哑铃集中弯举']
  },
  core:{
    machine:['器械卷腹','绳索卷腹','罗马椅背伸展','器械转体','悬垂举腿架'],
    free:['平板支撑','卷腹','俄罗斯转体','死虫式','悬垂举腿']
  }
};
// ===== EXERCISE META (icon + tip) =====
const EX_META={
'器械推胸':{tip:'挺胸沉肩，推至手臂微屈',icon:`<svg viewBox="0 0 40 40" fill="none" stroke="var(--accent)" stroke-width="1.6" stroke-linecap="round"><circle cx="20" cy="8" r="3"/><line x1="20" y1="11" x2="20" y2="24"/><line x1="12" y1="16" x2="28" y2="16"/><polyline points="12,16 8,22"/><polyline points="28,16 32,22"/><line x1="16" y1="24" x2="24" y2="24"/><line x1="16" y1="24" x2="14" y2="34"/><line x1="24" y1="24" x2="26" y2="34"/><rect x="4" y="20" width="4" height="6" rx="1" opacity=".3" fill="var(--accent)"/><rect x="32" y="20" width="4" height="6" rx="1" opacity=".3" fill="var(--accent)"/></svg>`},

const fmtTime=s=>{const m=Math.floor(s/60),sec=s%60;return`${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`};
const fmtDuration=s=>{const h=Math.floor(s/3600),m=Math.floor((s%3600)/60);return h>0?`${h}小时${m}分钟`:`${m}分钟`};
function getBodyPartName(id){const bp=BODY_PARTS.find(b=>b.id===id);return bp?bp.name:id}
function getAllExercises(partId){
  const base=EXERCISES[partId]||{machine:[],free:[]};
  const custom=S.customExercises.filter(e=>e.bodyPart===partId);
  const machine=[...base.machine.map(n=>({name:n,type:'machine'})),...custom.filter(e=>e.type==='machine')];

function calcVolume(exercises){return exercises.reduce((t,ex)=>t+ex.sets.reduce((st,s)=>st+s.weight*s.reps,0),0)}
function fmtVol(v){if(v===0)return'0';if(v>=10000)return(v/1000).toFixed(0)+'k';if(v>=1000)return(v/1000).toFixed(1)+'k';return Math.round(v).toString()}
function getPR(exerciseName){
  let max=0;
  S.trainingRecords.forEach(r=>{r.exercises.forEach(ex=>{if(ex.name===exerciseName)ex.sets.forEach(s=>{if(s.weight>max)max=s.weight})})});

}

    o.connect(g);g.connect(audioCtx.destination);

function aiPreWorkout(){
  const recs=S.trainingRecords.slice(-14);
  if(recs.length===0)return{title:'开始你的健身之旅',body:'还没有训练记录，今天选择一个你想练的部位开始吧！建议从大肌群（胸、背、腿）开始。'};
  const partCount={};const lastPart={};
  recs.forEach(r=>{partCount[r.bodyPart]=(partCount[r.bodyPart]||0)+1;if(!lastPart[r.bodyPart]||r.date>lastPart[r.bodyPart])lastPart[r.bodyPart]=r.date});
  const allParts=BODY_PARTS.map(b=>b.id);
  const neglected=allParts.filter(p=>!partCount[p]);
  if(neglected.length>0){const bp=neglected[0];return{title:'训练建议',body:`你最近没有训练过<strong>${getBodyPartName(bp)}</strong>，今天练一下吧！均衡训练各部位才能全面发展。`}}
  const sorted=allParts.sort((a,b)=>(lastPart[a]||'')>(lastPart[b]||'')?1:-1);
  const suggest=sorted[0];
  const lastDate=lastPart[suggest];
  const days=lastDate?Math.floor((new Date()-new Date(lastDate))/(86400000)):999;
  return{title:'今日推荐',body:`距离上次练<strong>${getBodyPartName(suggest)}</strong>已经${days}天了，建议今天安排${getBodyPartName(suggest)}训练。保持规律，持续进步！`};
}
function aiPostWorkout(record){
  const vol=calcVolume(record.exercises);
  const prevSame=S.trainingRecords.filter(r=>r.bodyPart===record.bodyPart&&r.id!==record.id).sort((a,b)=>b.date.localeCompare(a.date));
  let comp='';
  if(prevSame.length>0){
    const prevVol=calcVolume(prevSame[0].exercises);
    const diff=vol-prevVol;const pct=prevVol>0?Math.round(diff/prevVol*100):0;
    if(diff>0)comp=`训练量比上次提升了<strong>${pct}%</strong>，继续保持这个势头！`;
    else if(diff<0)comp=`训练量比上次减少了<strong>${Math.abs(pct)}%</strong>，可能是疲劳积累，注意恢复。`;
    else comp='训练量与上次持平，稳定也是一种进步。';
  }
  let prList=[];
  record.exercises.forEach(ex=>{
    const maxW=Math.max(...ex.sets.map(s=>s.weight));
    const prevMax=getPRBefore(ex.name,record.id);
    if(maxW>prevMax&&prevMax>0)prList.push(ex.name);
  });
  let prText=prList.length>0?`恭喜突破PR！<strong>${prList.join('、')}</strong>创下新纪录！`:'';
  const msgs=['每一次训练都在让你变得更强。','坚持就是胜利，你做到了！','汗水不会辜负你的努力。','今天的付出是明天的收获。'];
  const motto=msgs[Math.floor(Math.random()*msgs.length)];
  return{vol,comp,prText,motto,duration:record.duration};
}
function getPRBefore(name,excludeId){
  let max=0;
  S.trainingRecords.forEach(r=>{if(r.id!==excludeId)r.exercises.forEach(ex=>{if(ex.name===name)ex.sets.forEach(s=>{if(s.weight>max)max=s.weight})})});
  return max;
}
function aiDietFeedback(bodyRec){
  const diet=(bodyRec.diet||'').toLowerCase();
  const todayTraining=S.trainingRecords.filter(r=>r.date===bodyRec.date);
  if(!diet)return null;
  let tips=[];
  const hasProtein=/(蛋白|鸡胸|牛肉|鱼|虾|蛋|奶|whey|protein)/.test(diet);
  const hasCarb=/(碳水|米饭|面|香蕉|红薯|燕麦|面包)/.test(diet);
  if(todayTraining.length>0){
    if(!hasProtein)tips.push('今天有训练但蛋白质摄入似乎不足，建议补充蛋白粉或鸡胸肉，帮助肌肉恢复。');
    if(!hasCarb)tips.push('训练后适当补充碳水化合物，可以帮助恢复糖原储备。');
    if(hasProtein&&hasCarb)tips.push('蛋白质和碳水都有摄入，营养搭配不错！');
  }else{
    if(hasProtein)tips.push('今天虽然休息，蛋白质摄入有助于身体修复。');
    tips.push('休息日可以适当控制碳水摄入量。');
  }
  return tips.join(' ');
}
function aiWeeklyReport(){
  const now=new Date();const weekAgo=new Date(now-7*86400000);
  const weekStr=weekAgo.toISOString().slice(0,10);
  const weekRecs=S.trainingRecords.filter(r=>r.date>=weekStr);
  const weekBody=S.bodyRecords.filter(r=>r.date>=weekStr);
  if(weekRecs.length===0&&weekBody.length===0)return{title:'本周AI周报',body:'本周还没有训练和体重记录，开始行动吧！设定一个小目标，比如本周训练3次。'};
  let report=[];
  report.push(`本周训练了<strong>${weekRecs.length}次</strong>。`);
  const partCounts={};weekRecs.forEach(r=>{partCounts[r.bodyPart]=(partCounts[r.bodyPart]||0)+1});
  const trained=Object.keys(partCounts);
  const untrained=BODY_PARTS.filter(b=>!trained.includes(b.id)).map(b=>b.name);
  if(untrained.length>0)report.push(`未训练部位：<strong>${untrained.join('、')}</strong>，建议下周补上。`);
  else report.push('六大部位都有训练到，非常均衡！');
  if(weekBody.length>=2){
    const sorted=[...weekBody].sort((a,b)=>a.date.localeCompare(b.date));
    const first=sorted[0],last=sorted[sorted.length-1];
    if(first.weight&&last.weight){
      const diff=(last.weight-first.weight).toFixed(1);
      if(diff>0)report.push(`体重增加了${diff}kg。`);
      else if(diff<0)report.push(`体重下降了${Math.abs(diff)}kg。`);
      else report.push('体重保持稳定。');
    }
  }
  // Check for plateaus
  const twoWeekAgo=new Date(now-14*86400000).toISOString().slice(0,10);
  const prevWeekRecs=S.trainingRecords.filter(r=>r.date>=twoWeekAgo&&r.date<weekStr);
  if(prevWeekRecs.length>0&&weekRecs.length>0){
    const prevVol=prevWeekRecs.reduce((t,r)=>t+calcVolume(r.exercises),0);
    const curVol=weekRecs.reduce((t,r)=>t+calcVolume(r.exercises),0);
    if(curVol>prevVol*1.05)report.push('总训练量在提升，进步明显，继续加油！');
    else if(curVol<prevVol*0.95)report.push('总训练量有所下降，注意保持训练强度。');
    else report.push('总训练量基本持平，可以考虑适当增加强度来突破平台期。');
  }
  return{title:'本周AI周报',body:report.join('<br>')};
}

            <input type="number" placeholder="次数" id="r-${ei}" inputmode="numeric" value="${lastR}">
            <button class="s-check-btn" onclick="addSet(${ei})"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></button>
          </div>
        </div>
      </div>`;
    }).join('')}
  `);
  on('#btnAddMore','click',()=>{S.trainingScreen='selectExercise';renderTraining()});
  on('#btnFinish','click',finishTraining);
  // Rest time picker
  $$('#restPicker .rest-pick').forEach(btn=>btn.addEventListener('click',()=>{
    S.restSeconds=parseInt(btn.dataset.sec);saveState();
    $$('#restPicker .rest-pick').forEach(b=>b.classList.toggle('active',b===btn));
  }));
  // Top rest timer start button
  on('#btnRestTimer','click',()=>showTimer(S.restSeconds||90));
  // Enter key to save set
  ct.exercises.forEach((ex,ei)=>{
    const wI=$(`#w-${ei}`),rI=$(`#r-${ei}`);
    if(wI)wI.addEventListener('keydown',e=>{if(e.key==='Enter')addSet(ei)});
    if(rI)rI.addEventListener('keydown',e=>{if(e.key==='Enter')addSet(ei)});
  });
  // Swipe to delete
  $$('.swipe-wrap').forEach(wrap=>{
    const content=wrap.querySelector('.swipe-content');
    let startX=0,currentX=0,swiping=false;
    const ei=parseInt(wrap.dataset.ei),si=parseInt(wrap.dataset.si);
    content.addEventListener('touchstart',e=>{startX=e.touches[0].clientX;currentX=0;swiping=true},{passive:true});
    content.addEventListener('touchmove',e=>{
      if(!swiping)return;
      const dx=e.touches[0].clientX-startX;
      currentX=Math.min(0,Math.max(-80,dx));
      content.style.transform=`translateX(${currentX}px)`;
    },{passive:true});
    content.addEventListener('touchend',()=>{
      swiping=false;
      if(currentX<-40){
        content.style.transform='translateX(-72px)';
        wrap.querySelector('.swipe-del').onclick=()=>deleteSet(ei,si);
      }else{
        content.style.transform='translateX(0)';
      }
    });
  });
  if(S.trainingTimer.active&&!S.trainingTimer.interval){
    S.trainingTimer.interval=setInterval(()=>{
      const el=$('#trainingTime');
      if(el){const e=Math.floor((Date.now()-S.trainingTimer.startTime)/1000)+(S.trainingTimer.elapsed||0);el.textContent=fmtTime(e)}
    },1000);
  }
}
window.addSet=function(ei){
  const w=parseFloat($(`#w-${ei}`).value);
  const r=parseInt($(`#r-${ei}`).value);
  if(!w||!r||w<=0||r<=0)return;
  S.currentTraining.exercises[ei].sets.push({weight:w,reps:r});
  saveState();
  renderActiveTraining();
};
window.deleteSet=function(ei,si){
  S.currentTraining.exercises[ei].sets.splice(si,1);
  saveState();
  renderActiveTraining();
};
window.showTimer=function(seconds){
  S.timer={active:true,remaining:seconds,total:seconds,interval:null};
  renderTimer();
};
function renderTimer(){
  if(!S.timer.active)return;
  const existing=$('#timerOverlay');if(existing)existing.remove();
  let overlay=document.createElement('div');
  overlay.className='timer-overlay';
  overlay.id='timerOverlay';
  const circumference=2*Math.PI*90;
  const update=()=>{
    const pct=S.timer.remaining/S.timer.total;
    const offset=circumference*(1-pct);
    overlay.innerHTML=`
      <div class="timer-label">TRAINING TIMER</div>
      <div class="timer-circle">
        <svg viewBox="0 0 200 200"><circle class="track" cx="100" cy="100" r="90"/><circle class="progress" cx="100" cy="100" r="90" stroke-dasharray="${circumference}" stroke-dashoffset="${offset}"/></svg>
        <div class="timer-text">
          <div style="font-size:14px;color:var(--t2);font-weight:500">准备</div>
          <div style="font-size:52px;font-weight:700;line-height:1;color:var(--t1);font-variant-numeric:tabular-nums">${S.timer.remaining}</div>
          <div style="font-size:12px;color:var(--t3);margin-top:4px">组间${S.timer.total}秒</div>
        </div>
      </div>
      <button class="btn btn-outline btn-block" id="timerSkip" style="max-width:200px;margin-top:8px">跳过</button>
    `;
  };
  update();
  document.body.appendChild(overlay);
  function tick(){
    S.timer.remaining--;
    if(S.timer.remaining<=0){
      clearInterval(S.timer.interval);S.timer.interval=null;S.timer.active=false;
      playBeep();
      setTimeout(()=>{const o=$('#timerOverlay');if(o)o.remove()},500);
      return;
    }
    update();bindTimerEvents();
  }
  function bindTimerEvents(){
    on('#timerSkip','click',()=>{
      clearInterval(S.timer.interval);S.timer.interval=null;S.timer.active=false;
      const o=$('#timerOverlay');if(o)o.remove();
    });
  }
  S.timer.interval=setInterval(tick,1000);
  bindTimerEvents();
}
function startTrainingTimer(){
  S.trainingTimer={active:true,startTime:Date.now(),elapsed:0,interval:null};
}
function stopTrainingTimer(){
  if(S.trainingTimer.active){
    S.trainingTimer.elapsed+=Math.floor((Date.now()-S.trainingTimer.startTime)/1000);
    S.trainingTimer.active=false;
    if(S.trainingTimer.interval){clearInterval(S.trainingTimer.interval);S.trainingTimer.interval=null}
  }
}
function finishTraining(){
  const ct=S.currentTraining;
  if(!ct)return;
  const totalSets=ct.exercises.reduce((t,ex)=>t+ex.sets.length,0);
  if(totalSets===0){
    if(!confirm('你还没有记录任何组数据，确定要完成训练吗？'))return;
  }
  stopTrainingTimer();
  ct.duration=S.trainingTimer.elapsed;
  ct.totalVolume=calcVolume(ct.exercises);
  S.trainingScreen='summary';
  renderTraining();
}

    const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');a.href=url;a.download=`fittracker_backup_${today()}.json`;a.click();
    URL.revokeObjectURL(url);
  });
  // Import
  on('#importFile','change',e=>{
    const file=e.target.files[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=ev=>{
      try{
        const data=JSON.parse(ev.target.result);
        if(data.trainingRecords||data.bodyRecords){
          if(confirm('导入将覆盖现有数据，确定继续？')){
            S.profile=data.profile||S.profile;
            S.trainingRecords=data.trainingRecords||[];
            S.bodyRecords=data.bodyRecords||[];
            S.customExercises=data.customExercises||[];
            saveState();render();
          }
        }else{alert('无效的备份文件')}
      }catch(err){alert('文件解析失败')}
    };
    reader.readAsText(file);
  });
  // Exercise progress select
  on('#progressSelect','change',()=>renderProgressChart());
  // Render charts after DOM is ready
  setTimeout(()=>{
    if(!isChartReady()){const ce=$('#charts');if(ce)ce.innerHTML='<div class="ai-card"><div class="ai-body" style="text-align:center">图表库加载失败，请检查网络连接后刷新页面。</div></div>';return}
    renderWeightChart();renderFreqChart();renderDistChart();renderProgressChart()},50);
}
function getExerciseOptions(){
  const allNames=new Set();
  S.trainingRecords.forEach(r=>r.exercises.forEach(ex=>allNames.add(ex.name)));
  if(allNames.size===0)return'<option value="">暂无数据</option>';
  return[...allNames].map(n=>`<option value="${n}">${n}</option>`).join('');
}
// ===== CHARTS =====
const chartInstances={};
function destroyChart(id){if(chartInstances[id]){chartInstances[id].destroy();delete chartInstances[id]}}
const chartDefaults={responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:'#8888AA',font:{size:11}}},tooltip:{backgroundColor:'#1C1C36',borderColor:'#2A2A4A',borderWidth:1,titleColor:'#E8E8FF',bodyColor:'#8888AA'}},scales:{x:{ticks:{color:'#555577',font:{size:10}},grid:{color:'rgba(42,42,74,0.5)'}},y:{ticks:{color:'#555577',font:{size:10}},grid:{color:'rgba(42,42,74,0.5)'}}}};
// BUG3 fix: chart empty state helpers that preserve canvas element
function showChartEmpty(canvas,msg){canvas.style.display='none';const ex=canvas.parentElement.querySelector('.chart-empty-msg');if(ex)ex.innerHTML=msg;else canvas.insertAdjacentHTML('afterend','<div class="empty text-sm chart-empty-msg">'+msg+'</div>');}
function clearChartEmpty(canvas){canvas.style.display='';const ex=canvas.parentElement.querySelector('.chart-empty-msg');if(ex)ex.remove();}
// BUG4 fix: check if Chart.js loaded successfully
function isChartReady(){return typeof Chart!=='undefined'&&!window._chartLoadFailed;}

function renderWeightChart(){
  destroyChart('weight');
  if(!isChartReady())return;
  const canvas=$('#weightChart');if(!canvas)return;
  clearChartEmpty(canvas);
  const recs=[...S.bodyRecords].filter(r=>r.weight||r.bodyFat).sort((a,b)=>a.date.localeCompare(b.date)).slice(-30);
  if(recs.length<2){showChartEmpty(canvas,'需要至少2条体重记录');return}
  const datasets=[];
  if(recs.some(r=>r.weight))datasets.push({label:'体重(kg)',data:recs.map(r=>r.weight||null),borderColor:'#00E5FF',backgroundColor:'rgba(0,229,255,0.1)',tension:0.4,spanGaps:true,pointRadius:3,pointBackgroundColor:'#00E5FF'});
  if(recs.some(r=>r.bodyFat))datasets.push({label:'体脂(%)',data:recs.map(r=>r.bodyFat||null),borderColor:'#FFB300',backgroundColor:'rgba(255,179,0,0.1)',tension:0.4,spanGaps:true,yAxisID:'y1',pointRadius:3,pointBackgroundColor:'#FFB300'});
  const opts={...chartDefaults,scales:{...chartDefaults.scales}};
  if(datasets.length>1)opts.scales.y1={position:'right',ticks:{color:'#555577',font:{size:10}},grid:{display:false}};
  chartInstances.weight=new Chart(canvas,{type:'line',data:{labels:recs.map(r=>fmtDate(r.date)),datasets},options:opts});
}
function renderFreqChart(){
  destroyChart('freq');
  if(!isChartReady())return;
  const canvas=$('#freqChart');if(!canvas)return;
  clearChartEmpty(canvas);
  const recs=S.trainingRecords;
  if(recs.length===0){showChartEmpty(canvas,'暂无训练数据');return}
  // Last 8 weeks
  const weeks={};const now=new Date();
  for(let i=7;i>=0;i--){
    const d=new Date(now-i*7*86400000);
    const weekStart=new Date(d);weekStart.setDate(d.getDate()-d.getDay());
    const key=weekStart.toISOString().slice(0,10);
    weeks[key]=0;
  }
  recs.forEach(r=>{
    const d=new Date(r.date);const ws=new Date(d);ws.setDate(d.getDate()-d.getDay());
    const key=ws.toISOString().slice(0,10);
    if(key in weeks)weeks[key]++;
  });
  const labels=Object.keys(weeks).map(k=>fmtDate(k));
  const data=Object.values(weeks);
  chartInstances.freq=new Chart(canvas,{type:'bar',data:{labels,datasets:[{label:'训练次数',data,backgroundColor:'rgba(0,229,255,0.3)',borderColor:'#00E5FF',borderWidth:1,borderRadius:4}]},options:{...chartDefaults,plugins:{...chartDefaults.plugins,legend:{display:false}}}});
}
function renderDistChart(){
  destroyChart('dist');
  if(!isChartReady())return;
  const canvas=$('#distChart');if(!canvas)return;
  clearChartEmpty(canvas);
  const counts={};BODY_PARTS.forEach(b=>counts[b.id]=0);
  S.trainingRecords.forEach(r=>{if(counts[r.bodyPart]!==undefined)counts[r.bodyPart]++});
  const total=Object.values(counts).reduce((a,b)=>a+b,0);
  if(total===0){showChartEmpty(canvas,'暂无训练数据');return}
  const colors=['#00E5FF','#7C3AED','#00E676','#FFB300','#FF5252','#FF6EC7'];
  chartInstances.dist=new Chart(canvas,{type:'doughnut',data:{labels:BODY_PARTS.map(b=>b.name),datasets:[{data:BODY_PARTS.map(b=>counts[b.id]),backgroundColor:colors,borderColor:'#1C1C36',borderWidth:2}]},options:{responsive:true,maintainAspectRatio:false,cutout:'60%',plugins:{legend:{position:'right',labels:{color:'#8888AA',font:{size:11},padding:12,usePointStyle:true,pointStyleWidth:8}}}}});
}
function renderProgressChart(){
  destroyChart('progress');
  if(!isChartReady())return;
  const canvas=$('#progressChart');if(!canvas)return;
  clearChartEmpty(canvas);
  const sel=$('#progressSelect');
  const exName=sel?sel.value:'';
  if(!exName){showChartEmpty(canvas,'选择一个动作查看进步曲线');return}
  const dataPoints=[];
  S.trainingRecords.forEach(r=>{
    r.exercises.forEach(ex=>{
      if(ex.name===exName&&ex.sets.length>0){
        const maxW=Math.max(...ex.sets.map(s=>s.weight));
        dataPoints.push({date:r.date,weight:maxW});
      }
    });
  });
  dataPoints.sort((a,b)=>a.date.localeCompare(b.date));
  if(dataPoints.length<2){showChartEmpty(canvas,'需要至少2次'+exName+'记录');return}
  chartInstances.progress=new Chart(canvas,{type:'line',data:{labels:dataPoints.map(d=>fmtDate(d.date)),datasets:[{label:`${exName} 最大重量(kg)`,data:dataPoints.map(d=>d.weight),borderColor:'#00E676',backgroundColor:'rgba(0,230,118,0.1)',tension:0.4,fill:true,pointRadius:4,pointBackgroundColor:'#00E676'}]},options:{...chartDefaults,plugins:{...chartDefaults.plugins,legend:{display:false}}}});
}
// ===== INIT =====
function init(){
  render();
  // Resume training timer if there's an active training
  if(S.currentTraining&&S.trainingScreen==='active'){
    startTrainingTimer();
  }
}
init();
</script>
